<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Examen - Exame de Consciência</title>
    
    <!-- PWA settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0D0D0D" />
    
    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Examen" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    
    <style>
      /* Base styles to prevent white flash before React loads */
      body {
        margin: 0;
        padding: 0;
        background-color: #0D0D0D; /* dark background */
        color: #F5F5F5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      #root {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <noscript>Você precisa ativar o JavaScript para executar este aplicativo.</noscript>
    <div id="root"></div>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
